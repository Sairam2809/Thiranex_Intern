<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusShop — Premium Modular Product Catalog</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Accessibility Skip Link -->
    <a href="#view-mount" class="skip-link">Skip to main content</a>

    <!-- Particles Background -->
    <div class="particles-bg">
        <div class="particle" style="width: 150px; height: 150px; top: 10%; left: 5%; animation-duration: 40s; opacity: 0.1;"></div>
        <div class="particle" style="width: 250px; height: 250px; bottom: 10%; right: 5%; animation-duration: 60s; opacity: 0.08;"></div>
    </div>

    <!-- Application Shell -->
    <div class="app-shell">
        <!-- Site Header Navigation -->
        <header class="site-header">
            <div class="header-inner">
                <a href="#/" class="brand">
                    <span class="brand-icon">N</span>
                    <span class="brand-name">NexusShop</span>
                </a>
                
                <nav class="main-nav" aria-label="Main Navigation">
                    <ul class="nav-list">
                        <li><a href="#/" class="nav-link" id="nav-home">Home</a></li>
                        <li><a href="#/catalog" class="nav-link" id="nav-catalog">Catalog</a></li>
                    </ul>
                </nav>

                <div class="header-actions">
                    <!-- Theme Toggle -->
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Theme">
                        <span class="icon-moon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        </span>
                        <span class="icon-sun">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        </span>
                    </button>

                    <!-- Cart Indicator -->
                    <a href="#/cart" class="cart-trigger" id="cart-trigger" aria-label="Shopping Cart" title="Shopping Cart">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <span class="cart-badge" id="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Mount -->
        <main class="view-mount" id="view-mount" tabindex="-1">
            <!-- Router inserts view HTML here -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="site-footer">
            <div class="footer-inner">
                <p>&copy; 2026 NexusShop. Designed & Architected for Thiranex Internships.</p>
                <div class="footer-links">
                    <a href="#/">Home</a>
                    <a href="#/catalog">Products</a>
                    <a href="#/cart">Cart</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
